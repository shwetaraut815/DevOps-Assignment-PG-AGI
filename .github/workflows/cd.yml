name: CD - Deploy to ECS

on:
  workflow_run:
    workflows: ["CI - Build Images"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Configure AWS
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 2️⃣ Redeploy ECS services
      - name: Force ECS deploy
        run: |
          aws ecs update-service \
            --cluster devops-assignment-dev-cluster \
            --service devops-assignment-dev-frontend \
            --force-new-deployment

          aws ecs update-service \
            --cluster devops-assignment-dev-cluster \
            --service devops-assignment-dev-backend \
            --force-new-deployment
